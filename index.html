<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹绝境：核心防御</title>
    
    <!-- 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS样式 -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/cursor.css">
    <link rel="stylesheet" href="assets/css/hud.css">
    <link rel="stylesheet" href="assets/css/game-states.css">
    <link rel="stylesheet" href="assets/css/start-screen.css">
</head>
<body>

<div id="cursor">
    <div class="aim-ring"></div>
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
</div>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div id="uiLayer">
        <div class="hud-top">
            <div class="score-container">
                <div class="score-box">SCORE: <span id="scoreVal">0</span></div>
                <div class="highscore-box">BEST: <span id="highscoreVal">0</span></div>
            </div>
            <div class="stats-box">
                <div class="stat-item">
                    <span class="stat-label">WEAPON LVL</span>
                    <span class="stat-value" id="multVal">LVL 1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">DAMAGE</span>
                    <span class="stat-value" id="damageVal">10</span>
                </div>
            </div>
            <div class="health-container">
                <div id="healthBar" class="health-bar"></div>
                <div class="weapon-info" id="weaponName">PISTOL</div>
                <div class="health-text" id="healthText">100 / 100</div>
            </div>
        </div>
        <div class="hud-bottom">
            <div class="stats-panel">
                <div class="stats-row">
                    <span class="stats-label">KILLS</span>
                    <span class="stats-value" id="killsVal">0</span>
                </div>
                <div class="stats-row">
                    <span class="stats-label">TIME</span>
                    <span class="stats-value" id="timeVal">00:00</span>
                </div>
                <div class="stats-row">
                    <span class="stats-label">POWERUPS</span>
                    <span class="stats-value" id="powerupsVal">0</span>
                </div>
            </div>
            <div class="fps-display">FPS: <span id="fpsVal">60</span></div>
        </div>
    </div>

    <div id="gameOverMsg">
        <div class="gameover-title">SYSTEM FAILURE</div>
        <div class="gameover-stats">
            <div class="gameover-stat">FINAL SCORE: <span id="finalScore">0</span></div>
            <div class="gameover-stat">KILLS: <span id="finalKills">0</span></div>
            <div class="gameover-stat">TIME: <span id="finalTime">00:00</span></div>
            <div class="gameover-stat new-record" id="newRecord" style="display: none;">★ NEW RECORD ★</div>
        </div>
    </div>

    <div id="achievementPopup" class="achievement-popup">
        <div class="achievement-icon">★</div>
        <div class="achievement-text">
            <div class="achievement-title" id="achievementTitle">Achievement Unlocked</div>
            <div class="achievement-desc" id="achievementDesc">Description</div>
        </div>
    </div>

    <div id="waveAnnouncement" class="wave-announcement">
        <div class="wave-text" id="waveText">WAVE 1</div>
    </div>

    <div id="pauseOverlay">
        <div class="pause-menu">
            <div class="pause-title">PAUSED</div>
            <button class="pause-btn" id="resumeBtn">RESUME</button>
            <button class="pause-btn" id="settingsBtn">SETTINGS</button>
            <button class="pause-btn" id="resetBtn">RESTART</button>
        </div>
    </div>

    <div id="settingsOverlay" class="settings-overlay">
        <div class="settings-menu">
            <div class="settings-title">SETTINGS</div>
            <div class="settings-group">
                <label class="settings-label">MASTER VOLUME</label>
                <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
                <span class="volume-value" id="volumeValue">70%</span>
            </div>
            <div class="settings-group">
                <label class="settings-label">BGM VOLUME</label>
                <input type="range" id="bgmSlider" class="volume-slider" min="0" max="100" value="50">
                <span class="volume-value" id="bgmValue">50%</span>
            </div>
            <div class="settings-group">
                <label class="settings-label">SFX VOLUME</label>
                <input type="range" id="sfxSlider" class="volume-slider" min="0" max="100" value="80">
                <span class="volume-value" id="sfxValue">80%</span>
            </div>
            <div class="settings-group">
                <label class="settings-label">SHOW FPS</label>
                <input type="checkbox" id="showFpsCheck" class="settings-checkbox" checked>
            </div>
            <button class="pause-btn" id="closeSettingsBtn">BACK</button>
        </div>
    </div>

    <div id="startScreen">
        <h1 class="title">NEON DEFENSE</h1>
        <p class="subtitle">WASD to Move | HOLD Mouse to Shoot | ESC to Pause</p>
        <button id="startBtn" class="start-btn">Initialize System</button>
        <button id="demoBtn" class="start-btn" style="margin-top: 15px; font-size: 0.9em;">DEMO MODE</button>
    </div>
</div>

<!-- JavaScript模块 -->
<script src="assets/js/config.js"></script>
<script src="assets/js/audio-manager.js"></script>
<script src="assets/js/player.js"></script>
<script src="assets/js/projectile.js"></script>
<script src="assets/js/enemy.js"></script>
<script src="assets/js/powerup.js"></script>
<script src="assets/js/particles.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/game-loop.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
