<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="armor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#72b8ff"/>
      <stop offset="0.5" stop-color="#2458a6"/>
      <stop offset="1" stop-color="#081a3f"/>
    </linearGradient>
    <radialGradient id="core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#bfe7ff"/>
      <stop offset="1" stop-color="#388cff"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="blade">
      <path d="M-17 -34 L-10 -57 L0 -65 L10 -57 L17 -34 L8 -24 L-8 -24 Z"
            fill="url(#armor)" stroke="#65a8ff" stroke-width="2"/>
      <path d="M-8 -52 L0 -58 L8 -52 M0 -57 L0 -32"
            fill="none" stroke="#d6eeff" stroke-width="1.2" opacity="0.72"/>
    </g>
    <g id="rail">
      <path d="M-4 -45 L4 -45 L7 -27 L3 -21 L-3 -21 L-7 -27 Z"
            fill="#0c285b" stroke="#91c6ff" stroke-width="1.3"/>
      <circle cy="-39" r="2" fill="#e8f7ff"/>
    </g>
  </defs>

  <g transform="translate(75 75)" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <circle r="53" fill="#030918" fill-opacity="0.8" stroke="#408cff" stroke-width="2.2"
            stroke-dasharray="24 7"/>
    <g>
      <use href="#blade"/>
      <use href="#blade" transform="rotate(120)"/>
      <use href="#blade" transform="rotate(240)"/>
    </g>

    <path d="M0 -43 L37 22 L-37 22 Z" fill="#071329" stroke="#a1d1ff" stroke-width="1.8"/>
    <path d="M0 -38 L33 20 L-33 20 Z" fill="url(#armor)" stroke="#559cff" stroke-width="2"/>
    <path d="M0 -31 L26 15 L-26 15 Z" fill="#07142d" stroke="#7db8ff" stroke-width="1.4"/>
    <g>
      <use href="#rail"/>
      <use href="#rail" transform="rotate(120)"/>
      <use href="#rail" transform="rotate(240)"/>
    </g>
    <path d="M0 -27 L0 -21 M23 13 L18 10 M-23 13 L-18 10"
          stroke="#d9efff" stroke-width="1.2" opacity="0.75"/>

    <circle r="23.5" fill="#030713" stroke="#65a8ff" stroke-width="2.4"/>
    <circle r="17.5" fill="none" stroke="#245caf" stroke-width="1.1" stroke-dasharray="2 3"/>
    <path d="M0 -10 L9 6 L-9 6 Z" fill="#0e2b5c" stroke="#a9d9ff" stroke-width="1.2"/>
    <circle r="6.5" fill="url(#core)"/>
    <circle cx="-2" cy="-2" r="1.8" fill="#ffffff"/>
  </g>
</svg>
