<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9c1e2c"/>
      <stop offset="0.45" stop-color="#4b0914"/>
      <stop offset="1" stop-color="#160208"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff515c"/>
      <stop offset="0.35" stop-color="#8c1724"/>
      <stop offset="1" stop-color="#29040b"/>
    </linearGradient>
    <radialGradient id="reactor">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#ffc2a8"/>
      <stop offset="0.55" stop-color="#ff463d"/>
      <stop offset="1" stop-color="#8b0010"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="bastion" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-23 -51 L-18 -78 L-10 -86 L10 -86 L18 -78 L23 -51 L14 -40 L-14 -40 Z"
            fill="url(#plate)" stroke="#ff5159" stroke-width="2.4"/>
      <path d="M-12 -69 L-7 -77 L7 -77 L12 -69 L8 -58 L-8 -58 Z"
            fill="#230209" stroke="#ff7d76" stroke-width="1.5"/>
      <rect x="-4" y="-75" width="8" height="12" rx="2" fill="#ffcbc0" stroke="#ff3838" stroke-width="1.2" filter="url(#glow)"/>
      <path d="M-14 -48 L14 -48" stroke="#ff9a90" stroke-width="1.2" opacity="0.7"/>
    </g>
    <g id="clamp" stroke-linejoin="round">
      <path d="M20 -56 L41 -61 L57 -48 L61 -29 L50 -19 L36 -27 L31 -42 Z"
            fill="url(#plate)" stroke="#e73343" stroke-width="2"/>
      <path d="M42 -51 L52 -43 L53 -34 L48 -29 L41 -34 L37 -45 Z"
            fill="#2c050b" stroke="#ff6b6b" stroke-width="1.3"/>
      <circle cx="47" cy="-40" r="3" fill="#ffb0a3"/>
    </g>
  </defs>

  <g transform="translate(100 100)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Heavy fortress silhouette -->
    <path d="M0 -90 L60 -72 L88 -28 L88 28 L60 72 L0 90 L-60 72 L-88 28 L-88 -28 L-60 -72 Z"
          fill="#090106" stroke="#c80e25" stroke-width="4" filter="url(#glow)"/>
    <path d="M0 -80 L53 -64 L78 -24 L78 24 L53 64 L0 80 L-53 64 L-78 24 L-78 -24 L-53 -64 Z"
          fill="url(#shell)" stroke="#ff3444" stroke-width="2.2"/>
    <path d="M0 -69 L45 -55 L67 -20 L67 20 L45 55 L0 69 L-45 55 L-67 20 L-67 -20 L-45 -55 Z"
          fill="#150208" stroke="#7c0e1c" stroke-width="1.6"/>

    <!-- Cardinal shield towers -->
    <g filter="url(#glow)">
      <use href="#bastion"/>
      <use href="#bastion" transform="rotate(90)"/>
      <use href="#bastion" transform="rotate(180)"/>
      <use href="#bastion" transform="rotate(270)"/>
    </g>

    <!-- Diagonal armor clamps -->
    <g>
      <use href="#clamp"/>
      <use href="#clamp" transform="rotate(90)"/>
      <use href="#clamp" transform="rotate(180)"/>
      <use href="#clamp" transform="rotate(270)"/>
    </g>

    <!-- Structural rails -->
    <path d="M0 -58 L0 -40 M58 0 L40 0 M0 58 L0 40 M-58 0 L-40 0"
          stroke="#ff786e" stroke-width="2.2" opacity="0.75"/>
    <path d="M-39 -39 L-28 -28 M39 -39 L28 -28 M39 39 L28 28 M-39 39 L-28 28"
          stroke="#9f1322" stroke-width="2" opacity="0.8"/>

    <!-- Layered reactor housing -->
    <circle r="55" fill="none" stroke="#df1129" stroke-width="2.8"
            stroke-dasharray="18 6" filter="url(#glow)"/>
    <circle r="45" fill="#120106" stroke="#ff3c43" stroke-width="2.3"/>
    <circle r="38" fill="none" stroke="#77101d" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle r="31" fill="#060104" stroke="#e92535" stroke-width="2.5" filter="url(#glow)"/>
    <circle r="23" fill="none" stroke="#991523" stroke-width="1.4" stroke-dasharray="9 3"/>

    <!-- Reactor iris; center remains dark enough for HP text. -->
    <path d="M0 -17 L12 -12 L17 0 L12 12 L0 17 L-12 12 L-17 0 L-12 -12 Z"
          fill="#2d050b" stroke="#ff625b" stroke-width="1.8"/>
    <circle r="9" fill="url(#reactor)" filter="url(#glow)"/>
    <circle cx="-3" cy="-3" r="2.2" fill="#ffffff"/>

    <!-- Armor status lights -->
    <circle cx="0" cy="-57" r="3" fill="#ffd0c1"/>
    <circle cx="57" cy="0" r="3" fill="#ffd0c1"/>
    <circle cx="0" cy="57" r="3" fill="#ffd0c1"/>
    <circle cx="-57" cy="0" r="3" fill="#ffd0c1"/>
  </g>
</svg>
