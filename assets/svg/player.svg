<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#163451"/>
      <stop offset="0.55" stop-color="#087f8c"/>
      <stop offset="1" stop-color="#052133"/>
    </linearGradient>
    <linearGradient id="wing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c5369"/>
      <stop offset="1" stop-color="#061827"/>
    </linearGradient>
    <linearGradient id="canopy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9ffff"/>
      <stop offset="0.3" stop-color="#25efff"/>
      <stop offset="1" stop-color="#073a62"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#66ffff"/>
      <stop offset="1" stop-color="#00aaff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Engine aura -->
  <path d="M84 139 L94 139 L91 184 L79 151 Z M106 139 L116 139 L121 151 L109 184 Z"
        fill="#00eaff" opacity="0.28" filter="url(#softGlow)"/>

  <g stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)">
    <!-- Dark silhouette gives the ship weight against bright effects. -->
    <path d="M100 17 L117 67 L136 91 L169 119 L145 143 L119 128 L112 151 L88 151 L81 128 L55 143 L31 119 L64 91 L83 67 Z"
          fill="#030b18" stroke="#00ffd5" stroke-width="3" opacity="0.9"/>

    <!-- Swept wings -->
    <path d="M84 70 L65 94 L33 119 L55 137 L86 117 L96 91 Z"
          fill="url(#wing)" stroke="#00e8d0" stroke-width="2.2"/>
    <path d="M116 70 L135 94 L167 119 L145 137 L114 117 L104 91 Z"
          fill="url(#wing)" stroke="#00e8d0" stroke-width="2.2"/>
    <path d="M65 96 L44 117 L57 126 L82 110" fill="#0a9a9d" opacity="0.65"/>
    <path d="M135 96 L156 117 L143 126 L118 110" fill="#0a9a9d" opacity="0.65"/>

    <!-- Central armored fuselage -->
    <path d="M100 18 L116 76 L112 125 L100 146 L88 125 L84 76 Z"
          fill="url(#hull)" stroke="#48ffe6" stroke-width="2.5"/>
    <path d="M100 25 L100 137 M88 78 L100 91 L112 78"
          fill="none" stroke="#a9fff3" stroke-width="1.3" opacity="0.55"/>
    <path d="M89 113 L100 121 L111 113" fill="none" stroke="#00ffd5" stroke-width="1.4" opacity="0.75"/>

    <!-- Glass canopy -->
    <path d="M100 48 C111 54 112 74 100 86 C88 74 89 54 100 48 Z"
          fill="url(#canopy)" stroke="#9dffff" stroke-width="1.8"/>
    <path d="M96 54 C100 51 105 55 106 62" fill="none" stroke="#ffffff" stroke-width="2.2" opacity="0.85"/>

    <!-- Wing circuitry and weapon pods -->
    <path d="M79 91 L60 108 L48 118 M121 91 L140 108 L152 118"
          fill="none" stroke="#4affdf" stroke-width="1.4" opacity="0.72"/>
    <path d="M51 111 L40 120 L54 132 L65 122 Z M149 111 L160 120 L146 132 L135 122 Z"
          fill="#05283b" stroke="#68fff0" stroke-width="1.7"/>
    <circle cx="46" cy="120" r="3.5" fill="#e9ffff" stroke="#00ffd5" stroke-width="1.5"/>
    <circle cx="154" cy="120" r="3.5" fill="#e9ffff" stroke="#00ffd5" stroke-width="1.5"/>

    <!-- Twin engine housings -->
    <path d="M82 125 L95 132 L93 151 L82 151 Z M118 125 L105 132 L107 151 L118 151 Z"
          fill="#041522" stroke="#00d9d1" stroke-width="1.8"/>
    <rect x="84" y="145" width="9" height="7" rx="2" fill="#cfffff" stroke="#00eaff" stroke-width="1"/>
    <rect x="107" y="145" width="9" height="7" rx="2" fill="#cfffff" stroke="#00eaff" stroke-width="1"/>

    <!-- Engine plasma -->
    <path d="M85 151 C84 164 88 175 89 181 C92 170 94 160 92 151 Z" fill="url(#flame)"/>
    <path d="M108 151 C106 160 108 170 111 181 C112 173 116 164 115 151 Z" fill="url(#flame)"/>

    <!-- Nose beacon -->
    <circle cx="100" cy="24" r="2.6" fill="#ffffff" stroke="#54fff0" stroke-width="1.2"/>
  </g>
</svg>
