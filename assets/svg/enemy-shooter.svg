<?xml version="1.0" encoding="UTF-8"?>
<svg width="150" height="150" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcb48"/>
      <stop offset="0.42" stop-color="#b65b08"/>
      <stop offset="1" stop-color="#301203"/>
    </linearGradient>
    <linearGradient id="barrel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#572100"/>
      <stop offset="0.5" stop-color="#ffc22d"/>
      <stop offset="1" stop-color="#572100"/>
    </linearGradient>
    <radialGradient id="core">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.25" stop-color="#ffe7a2"/>
      <stop offset="1" stop-color="#ff9d00"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <g id="cannon" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-15 -20 L-12 -38 L-7 -45 L7 -45 L12 -38 L15 -20 L8 -13 L-8 -13 Z"
            fill="url(#metal)" stroke="#ffac1c" stroke-width="2"/>
      <path d="M-6 -45 L-5 -58 L5 -58 L6 -45 Z" fill="url(#barrel)" stroke="#ffd05c" stroke-width="1.5"/>
      <path d="M-8 -61 L-5 -66 L5 -66 L8 -61 L5 -56 L-5 -56 Z"
            fill="#331100" stroke="#ffbd32" stroke-width="1.6" filter="url(#glow)"/>
      <rect x="-3.5" y="-64" width="7" height="4" rx="1" fill="#fff2b8"/>
      <path d="M-9 -34 L9 -34 M-7 -28 L7 -28" stroke="#ffe09a" stroke-width="1" opacity="0.65"/>
    </g>
  </defs>

  <g transform="translate(75 75)" stroke-linejoin="round" stroke-linecap="round">
    <circle r="56" fill="#130900" fill-opacity="0.72" stroke="#d97000" stroke-width="2.2"
            stroke-dasharray="22 7" filter="url(#glow)"/>
    <circle r="49" fill="none" stroke="#ff9d00" stroke-width="1.2" stroke-dasharray="3 6" opacity="0.75"/>

    <!-- Triangular weapons frame -->
    <path d="M0 -40 L35 20 L-35 20 Z" fill="#160b02" stroke="#ffbd39" stroke-width="2"/>
    <path d="M0 -31 L27 16 L-27 16 Z" fill="url(#metal)" stroke="#a74f04" stroke-width="1.5" opacity="0.9"/>
    <path d="M0 -40 L0 -25 M35 20 L22 13 M-35 20 L-22 13"
          stroke="#ffe5a6" stroke-width="1.4" opacity="0.65"/>

    <g filter="url(#glow)">
      <use href="#cannon"/>
      <use href="#cannon" transform="rotate(120)"/>
      <use href="#cannon" transform="rotate(240)"/>
    </g>

    <!-- Central fire-control computer -->
    <circle r="25" fill="#0d0702" stroke="#ff9700" stroke-width="2.6" filter="url(#glow)"/>
    <circle r="19" fill="none" stroke="#7f3900" stroke-width="1.2" stroke-dasharray="8 3"/>
    <path d="M0 -12 L10 -6 L10 6 L0 12 L-10 6 L-10 -6 Z"
          fill="#4a1c00" stroke="#ffc350" stroke-width="1.3"/>
    <circle r="7" fill="url(#core)" filter="url(#glow)"/>
    <circle cx="-2" cy="-2" r="2" fill="#ffffff"/>

    <!-- Targeting lamps -->
    <circle cx="0" cy="-47" r="2.2" fill="#fff2b2"/>
    <circle cx="41" cy="24" r="2.2" fill="#fff2b2"/>
    <circle cx="-41" cy="24" r="2.2" fill="#fff2b2"/>
  </g>
</svg>
